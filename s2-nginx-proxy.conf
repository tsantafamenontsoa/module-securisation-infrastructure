events {
    worker_connections 1024;
}

http {
    # ========================================================================
    # Configuration du reverse proxy NGINX pour LogiStock S2
    # Terminaison TLS et redirection HTTP → HTTPS
    # ========================================================================

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ========================================================================
    # Upstream backend (serveur web PHP)
    # ========================================================================
    upstream logistock_backend {
        server logistock_web:80;
    }

    # ========================================================================
    # Server HTTP → Redirection vers HTTPS
    # ========================================================================
    server {
        listen 80;
        server_name logistock.local localhost;

        # Redirection permanente vers HTTPS
        return 301 https://$server_name$request_uri;
    }

    # ========================================================================
    # Server HTTPS — Terminaison TLS
    # ========================================================================
    server {
        listen 443 ssl http2;
        server_name logistock.local localhost;

        # Certificats TLS
        ssl_certificate /etc/nginx/certs/logistock.crt;
        ssl_certificate_key /etc/nginx/certs/logistock.key;

        # Configuration TLS moderne (Mozilla Intermediate)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
        ssl_prefer_server_ciphers off;

        # Session cache
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # OCSP Stapling (désactivé pour cert auto-signé)
        # ssl_stapling on;
        # ssl_stapling_verify on;

        # ====================================================================
        # Locations
        # ====================================================================

        # Root location → Proxying vers le backend
        location / {
            proxy_pass http://logistock_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Buffer settings
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Bloquer l'accès aux fichiers sensibles
        location ~ /\.(?!well-known) {
            deny all;
            return 404;
        }

        # Bloquer l'accès aux fichiers de config
        location ~* \.(conf|config|sql|bak|backup)$ {
            deny all;
            return 404;
        }
    }
}
